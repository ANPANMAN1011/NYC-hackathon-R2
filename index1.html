<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieMate</title>
    <link rel="stylesheet" href="style1.css" type="text/css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="start-screen">
    <h1>MovieMate</h1>
    <p class="p1">Stop Scrolling.</p>
    <p class="p2">Start Watching.</p>
    <p class="p3">Answer 6 quick questions and we'll find your 
        perfect movie.</p>
    <button class="start-btn">Find My Movie</button>
    <button class="b2">Surprise Me</button>
    </div>
    <div class="screen1 hidden">
        <h1 class="q1">Where are you watching today?</h1>
        <p class="comment1">Choose your streaming platform.</p>
        <div class="options">
            <button class="option-btn">Netflix</button>
            <button class="option-btn">Apple TV+</button>
            <button class="option-btn">Amazon Prime Video</button>
            <button class="option-btn">Disney+ Hotstar</button>
            <button class="option-btn">HBO Max</button>
            <button class="option-btn">I Don't Mind</button>
        </div>
    <script src="main.js" ></script>
</body>
</html>
