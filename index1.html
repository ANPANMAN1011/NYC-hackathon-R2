<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieMate</title>
    <link rel="stylesheet" href="style1.css" type="text/css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="start-screen">
    <h1>MovieMate</h1>
    <p class="p1">Stop Scrolling.</p>
    <p class="p2">Start Watching.</p>
    <p class="p3">Answer 6 quick questions and we'll find your 
        perfect movie.</p>
    <button class="start-btn">Find My Movie</button>
    <button class="b2">Surprise Me</button>
    </div>
    <div class="screen1">
        <h1 class="q1">Where are you watching today?</h1>
        <p class="comment1">Choose your streaming platform.</p>
        <div class="options">
            <input type="checkbox" id="netflix">
            <label for="netflix">Netflix</label><br>

            <input type="checkbox" id="prime">
            <label for="prime">Amazon Prime</label><br>

            <input type="checkbox" id="disney">
            <label for="disney">Disney+ Hotstar</label>
            
        </div>
    <script src="main.js" ></script>
</body>
</html>
