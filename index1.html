<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieMate</title>
    <link rel="stylesheet" href="style1.css" type="text/css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="start-screen">
    <h1>MovieMate</h1>
    <p class="p1">Stop Scrolling.</p>
    <p class="p2">Start Watching.</p>
    <p class="p3">Answer 6 quick questions and we'll find your 
        perfect movie.</p>
    <button class="start-btn">Find My Movie</button>
    <button class="b2">Surprise Me</button>
    </div>
    <div class="screen1">
        <h1 class="q1">Where are you watching today?</h1>
        <p class="comment1">Choose your streaming platform.</p>
        <div class="options">
            <label>
            <input type="checkbox1" name="platform" value="Netflix">
            Netflix
            </label>
            <label>
            <input type="checkbox1" name="platform" value=" JioHotstar">
            JioHotstar
            </label>
            <label>
            <input type="checkbox1" name="platform" value="Amazon Prime Video">
            Amazon Prime Video
            </label>    
            <label>
            <input type="checkbox1" name="platform" value="HBO Max">
            HBO Max
            </label>
            <label>
            <input type="checkbox1" name="platform" value="Apple TV+">  
            Apple TV+
            </label>
            <label>
            <input type="checkbox1" name="platform" value="I Don't Mind">
            I Don't Mind
            </label>
            
        </div>
    <script src="main.js" ></script>
</body>
</html>
